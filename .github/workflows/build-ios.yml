name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: |
          brew update || true
          brew install xcodegen || true
          xcodegen version

      - name: Generate Xcode Project
        run: |
          cd BookReader
          echo "=== Current directory: $(pwd) ==="
          echo "=== Files ==="
          ls -la
          echo "=== project.yml exists? ==="
          test -f project.yml && echo "YES" || echo "NO"
          if [ -f project.yml ]; then
            echo "=== project.yml content (first 20 lines) ==="
            head -20 project.yml
          fi
          echo "=== Running xcodegen generate ==="
          xcodegen generate --verbose 2>&1
          EC=$?
          echo "=== xcodegen exit code: $EC ==="
          echo "=== Generated files ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No .xcodeproj found"
          exit $EC

      - name: Build
        run: |
          set -x
          cd BookReader
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee ../build.log | tail -60
          echo "=== BUILD EXIT CODE: $? ==="

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          echo "APP path: ${APP:-NOT FOUND}"
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            echo "Found app, packaging IPA..."
            mkdir -p /tmp/ipa/Payload
            cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq "$GITHUB_WORKSPACE/output/BookReader.ipa" Payload/
            echo "IPA created successfully!"
            ls -lh "$GITHUB_WORKSPACE/output/BookReader.ipa"
          else
            echo "Build failed, no .app found"
            find build -name "*.app" -type d 2>/dev/null | head -5
            tail -100 build.log 2>/dev/null || echo "No build log available"
            echo "BUILD_FAILED" > output/status.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
