name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project BookReader.xcodeproj \
            -scheme BookReader \
            -sdk iphoneos

      - name: Build App
        run: |
          xcodebuild \
            -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ENABLE_USER_SCRIPT_SANDBOXING=NO \
            clean build 2>&1 | tee build.log

      - name: Find Build Output
        run: |
          echo "=== 检查构建产物 ==="
          find build -name "*.app" -type d 2>/dev/null
          echo "---"
          ls -la build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "No products directory"

      - name: Create Unsigned IPA
        if: always()
        run: |
          mkdir -p output
          APP_PATH=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到 App: $APP_PATH"
            mkdir -p /tmp/ipa-build/Payload
            cp -R "$APP_PATH" /tmp/ipa-build/Payload/
            cd /tmp/ipa-build && zip -r $GITHUB_WORKSPACE/output/BookReader-unsigned.ipa Payload/
            echo "IPA 创建成功!"
            ls -lh $GITHUB_WORKSPACE/output/BookReader-unsigned.ipa
          else
            echo "未找到 .app 文件"
            echo "尝试查找所有产物..."
            find build -type f -name "*.app" 2>/dev/null
            find . -type d -name "*.app" 2>/dev/null
            # Create a log file
            cp build.log output/build.log || true
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-iOS-${{ github.run_id }}
          path: output/*
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "# 📱 BookReader iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **状态** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **下载** | 查看 Artifacts → \`BookReader-iOS-${{ github.run_id }}\` |"
