name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore: ['**.md','LICENSE','.gitignore']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download SwiftSoup
        run: |
          mkdir -p BookReader/SwiftSoup
          cd BookReader/SwiftSoup
          for f in Cleaner Color Entities Exception Formatter Node Parse PseudoRegex Request Safety Select SwiftSoup Traverse Util Vector; do
            curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/${f}.swift" -o "${f}.swift"
          done
          curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/String+Extension.swift" -o "String+Extension.swift"
          echo "SwiftSoup: $(ls *.swift | wc -l) files"

      - name: Regenerate project (includes SwiftSoup)
        run: python3 generate_project.py

      - name: Build
        run: |
          cd BookReader
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee ../build.log
          echo "EXIT=$?"

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            mkdir -p /tmp/ipa/Payload && cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq "$GITHUB_WORKSPACE/output/BookReader.ipa" Payload/
            echo "IPA_OK $(ls -lh $GITHUB_WORKSPACE/output/BookReader.ipa)"
          else
            tail -200 build.log > output/build_log.txt 2>/dev/null
            echo "FAILED" > output/status.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
