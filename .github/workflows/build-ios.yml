name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SwiftSoup Source
        run: |
          echo "=== Downloading SwiftSoup ==="
          mkdir -p BookReader/SwiftSoup
          cd BookReader/SwiftSoup
          files="Cleaner Color Entities Exception Formatter Node Parse PseudoRegex Request Safety Select SwiftSoup Traverse Util Vector"
          for name in $files; do
            curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/${name}.swift" -o "${name}.swift" 2>/dev/null || echo "Failed: ${name}"
          done
          curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/String+Extension.swift" -o "String+Extension.swift" 2>/dev/null || echo "Failed StringExt"
          echo "=== Files downloaded: $(ls *.swift 2>/dev/null | wc -l) ==="
          ls -la

      - name: Generate Xcode Project
        run: |
          python3 generate_project.py
          echo "=== Verifying project ==="
          test -f BookReader/BookReader.xcodeproj/project.pbxproj && echo "OK: pbxproj exists" || { echo "FAIL: no pbxproj"; exit 1; }
          wc -l BookReader/BookReader.xcodeproj/project.pbxproj

      - name: Build
        run: |
          set -x
          cd BookReader
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee ../build.log | tail -80
          RET=$?
          echo "BUILD_EXIT_CODE=$RET"
          exit $RET

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            mkdir -p /tmp/ipa/Payload
            cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq "$GITHUB_WORKSPACE/output/BookReader.ipa" Payload/
            echo "IPA OK: $(ls -lh $GITHUB_WORKSPACE/output/BookReader.ipa)"
          else
            echo "NO_APP_FOUND"
            tail -200 build.log 2>/dev/null > output/build_log.txt || true
            echo "FAILED" > output/status.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
