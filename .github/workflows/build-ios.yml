name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen || true

      - name: Generate Xcode Project
        run: |
          cat > BookReader/project.yml << 'EOF'
          name: BookReader
          options:
            bundleIdPrefix: com.bookreader
            deploymentTarget:
              iOS: "17.0"
            xcodeVersion: "15.0"
            generateEmptyDirectories: true
            groupSortPosition: top
          settings:
            base:
              SWIFT_VERSION: "5.9"
              MARKETING_VERSION: "1.0.0"
              CURRENT_PROJECT_VERSION: "1"
              PRODUCT_BUNDLE_IDENTIFIER: "com.bookreader.app"
              INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
              INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
              INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
              INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
              INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: "NO"
              CODE_SIGNING_ALLOWED: "NO"
              DEVELOPMENT_TEAM: ""
              ENABLE_USER_SCRIPT_SANDBOXING: "NO"
          packages:
            SwiftSoup:
              url: https://github.com/scinfu/SwiftSoup.git
              from: 2.6.1
          targets:
            BookReader:
              type: application
              platform: iOS
              sources:
                - path: .
                  excludes:
                    - "**/*.xcassets"
              resources:
                - path: Assets.xcassets
              dependencies:
                - package: SwiftSoup
          EOF

          cd BookReader && xcodegen generate

      - name: Show Project Structure
        run: find BookReader -name "*.xcodeproj" -o -name "*.pbxproj" | head -5

      - name: Resolve Dependencies
        run: |
          cd BookReader
          xcodebuild -resolvePackageDependencies \
            -project BookReader.xcodeproj \
            -scheme BookReader

      - name: Build App
        run: |
          cd BookReader
          set -o pipefail
          xcodebuild \
            -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath build/.packages \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build 2>&1 | tee /tmp/xcodebuild.log | tail -n 200

      - name: Check Build Output
        run: |
          echo "=== 检查构建产物 ==="
          find BookReader/build -name "*.app" -type d 2>/dev/null
          echo "---"
          ls -la BookReader/build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "No products directory"

      - name: Create Unsigned IPA
        if: always()
        run: |
          mkdir -p output
          APP_PATH=$(find BookReader/build -name "BookReader.app" -type d 2>/dev/null | head -1)

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "找到 App: $APP_PATH"
            mkdir -p /tmp/ipa-build/Payload
            cp -R "$APP_PATH" /tmp/ipa-build/Payload/
            cd /tmp/ipa-build && zip -r $GITHUB_WORKSPACE/output/BookReader-unsigned.ipa Payload/
            echo "IPA 创建成功!"
            ls -lh $GITHUB_WORKSPACE/output/BookReader-unsigned.ipa
          else
            echo "未找到 .app 文件"
            echo "尝试查找所有产物..."
            find BookReader/build -type f -name "*.app" 2>/dev/null
            find BookReader -type d -name "*.app" 2>/dev/null
            # 创建一个空的占位文件说明情况
            echo "构建可能失败，请检查上面的日志" > output/BUILD_LOG.txt
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BookReader-iOS-${{ github.run_id }}
          path: output/*
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "# 📱 BookReader iOS Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | \`${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **状态** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **下载** | 查看 Artifacts → \`BookReader-iOS-${{ github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY