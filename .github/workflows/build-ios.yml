name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore: ['**.md','LICENSE','.gitignore']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download SwiftSoup
        run: |
          mkdir -p BookReader/SwiftSoup
          cd BookReader/SwiftSoup
          for f in Cleaner Color Entities Exception Formatter Node Parse PseudoRegex Request Safety Select SwiftSoup Traverse Util Vector; do
            curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/${f}.swift" -o "${f}.swift"
          done
          curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/String+Extension.swift" -o "String+Extension.swift"
          echo "SwiftSoup: $(ls *.swift | wc -l) files"

      - name: Update project with SwiftSoup files
        run: |
          cd BookReader
          python3 << 'EOF'
          import os, uuid

          def uid(s=''):
              return str(uuid.uuid4()).replace('-','').upper()[:24] + s

          proj_path = "BookReader.xcodeproj"
          with open(f"{proj_path}/project.pbxproj", 'r') as f:
              content = f.read()

          # Find SwiftSoup files in the directory
          ss_files = []
          ss_dir = os.path.join("BookReader", "SwiftSoup")
          if os.path.isdir(ss_dir):
              for root, dirs, files in os.walk(ss_dir):
                  for f in sorted(files):
                      if f.endswith('.swift'):
                          ss_files.append(os.path.relpath(os.path.join(root,f), "BookReader"))

          print(f"SwiftSoup files to add: {len(ss_files)}")

          # Add SwiftSoup files to the project
          # This is a simplified approach - just add file references and build phases
          ss_file_refs = []
          ss_build_files = []

          for sf in ss_files:
              fu = uid('f')
              bu = uid('b')
              # Add PBXFileReference
              ss_file_refs.append(f'''
                      {fu} /* {sf} */ = {{isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = {sf}; sourceTree = "<group>"; }};''')
              # Add PBXBuildFile
              ss_build_files.append(f'''
                      {bu} /* {sf} in Sources */ = {{isa = PBXBuildFile; fileRef = {fu} /* {sf} */; }};''')

          # Find and replace PBXFileReference section end
          # Find and replace PBXBuildFile section end

          print("Project update not implemented - using existing project")
          EOF

      - name: Build
        run: |
          cd BookReader
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee ../build.log
          echo "EXIT=$?"

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            mkdir -p /tmp/ipa/Payload && cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq "$GITHUB_WORKSPACE/output/BookReader.ipa" Payload/
            echo "IPA_OK $(ls -lh $GITHUB_WORKSPACE/output/BookReader.ipa)"
          else
            tail -200 build.log > output/build_log.txt 2>/dev/null
            echo "FAILED" > output/status.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
