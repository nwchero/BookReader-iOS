name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download SwiftSoup Source
        run: |
          mkdir -p BookReader/SwiftSoup
          cd BookReader/SwiftSoup
          for f in Cleaner Color Entities Exception Formatter Node Parse PseudoRegex Request Safety Select SwiftSoup Traverse Util Vector; do
            curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/${f}.swift" -o "${f}.swift"
          done
          curl -sL "https://raw.githubusercontent.com/scinfu/SwiftSoup/2.6.1/Sources/SwiftSoup/String+Extension.swift" -o "String+Extension.swift"
          echo "SwiftSoup: $(ls *.swift 2>/dev/null | wc -l) files"

      - name: Generate Xcode Project
        run: |
          set +e
          python3 generate_project.py 2>&1
          echo "---"
          echo "pbxproj: $(test -f BookReader/BookReader.xcodeproj/project.pbxproj && echo EXISTS || echo MISSING)"
          echo "scheme: $(test -f BookReader/BookReader.xcodeproj/xcshareddata/xcschemes/BookReader.xcscheme && echo EXISTS || echo MISSING)"
          echo "---"
          echo "xcodebuild -list output:"
          xcodebuild -project BookReader/BookReader.xcodeproj -list 2>&1 || echo "(xcodebuild -list failed, continuing anyway)"
          set -e

      - name: Build
        run: |
          cd BookReader
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee ../build.log
          echo "EXIT_CODE=$?"

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find build -name "BookReader.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            mkdir -p /tmp/ipa/Payload
            cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq "$GITHUB_WORKSPACE/output/BookReader.ipa" Payload/
            echo "IPA_OK $(ls -lh $GITHUB_WORKSPACE/output/BookReader.ipa 2>/dev/null)"
          else
            echo "NO_APP_FOUND"
            tail -200 build.log 2>/dev/null > output/build_log.txt || true
            echo "FAILED" > output/status.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
