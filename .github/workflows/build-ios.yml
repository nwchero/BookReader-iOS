name: Build iOS IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || true

      - name: Generate Xcode Project
        working-directory: BookReader
        run: |
          cat > project.yml << 'EOF'
          name: BookReader
          options:
            bundleIdPrefix: com.bookreader
            deploymentTarget:
              iOS: "16.0"
            xcodeVersion: "15.0"
          settings:
            base:
              SWIFT_VERSION: "5.9"
              MARKETING_VERSION: "1.0.0"
              PRODUCT_BUNDLE_IDENTIFIER: "com.bookreader.app"
              INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: "NO"
              DEVELOPMENT_TEAM: ""
          targets:
            BookReader:
              type: application
              platform: iOS
              sources:
                - path: .
                  excludes:
                    - "**/*.xcassets"
                    - "**/default_sources.json"
              resources:
                - path: Assets.xcassets
              dependencies:
                - package: https://github.com/scinfu/SwiftSoup.git
                  from: "2.6.1"
          EOF
          xcodegen generate

      - name: Build
        run: |
          cd BookReader && \
          xcodebuild -project BookReader.xcodeproj \
            -scheme BookReader \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            clean build 2>&1 | tail -20 || true

      - name: Package IPA
        if: always()
        run: |
          mkdir -p output
          APP=$(find BookReader/build -name "BookReader.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            mkdir -p /tmp/ipa/Payload
            cp -R "$APP" /tmp/ipa/Payload/
            cd /tmp/ipa && zip -rq $GITHUB_WORKSPACE/output/BookReader.ipa Payload/
            echo "IPA created!"
          else
            echo "Build failed, no app found" > output/status.txt
            find BookReader/build -type f 2>/dev/null | head -10
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: BookReader-IPA
          path: output/*
          retention-days: 30
